; ============================================================
; PlatformIO Project Configuration
; Project  : Hotel Room Thermostat
; Hardware : ESP32-S3 4848S040 (4.0" ST7701, GT911, Custom PCB)
; ============================================================

[platformio]
default_envs = thermostat

; ----------------------------------------------------------
; Shared settings
; ----------------------------------------------------------
[env]
monitor_speed    = 115200
upload_speed     = 921600
; Auto-detect COM port (no manual setting needed)
monitor_rts      = 0
monitor_dtr      = 0

; ----------------------------------------------------------
; Main environment
; ----------------------------------------------------------
[env:thermostat]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; ---- Flash & Memory ----------------------------------------
board_build.mcu                      = esp32s3
board_build.f_cpu                    = 240000000L
board_build.flash_size               = 8MB
board_build.flash_freq               = 80m
board_build.flash_mode               = qio
; OPI PSRAM (8MB) — qio_opi = QIO Flash + OPI PSRAM
board_build.arduino.memory_type      = qio_opi
board_build.partitions               = partitions.csv

; ---- Source files ------------------------------------------
; lvgl/ folder contains SquareLine Studio generated UI files
build_src_filter =
    +<*>
    +<../lvgl/*.c>
    -<../lvgl/ui_events.c>

; ---- Build flags -------------------------------------------
build_flags =
    ; PSRAM
    -DBOARD_HAS_PSRAM
    ; LVGL config — lv_conf.h lives in include/
    -DLV_CONF_INCLUDE_SIMPLE
    -I include
    ; lvgl UI sources need access to lvgl headers
    -I lvgl
    ; ── LOG LEVEL ───────────────────────────────────────────────────────────────
    ; 0=NONE, 1=ERROR, 2=INFO, 3=DEBUG. For production, set to 0 to disable all
    ; Serial output except for Modbus, which is critical for performance.
    ; -DPROJECT_LOG_LEVEL=0
    ; Force Serial to UART0 (IO43/IO44) instead of native USB
    -DARDUINO_USB_CDC_ON_BOOT=0

; ---- Libraries ---------------------------------------------
lib_deps =
    lvgl/lvgl @ ~8.3.11
    moononournation/GFX Library for Arduino @ ~1.4.9
    emelianov/modbus-esp8266 @ ^4.1.0
    bblanchon/ArduinoJson @ ^6.21.5
    tzapu/WiFiManager @ ^2.0.16-rc.2

; All local libraries are in lib/ — no lib_extra_dirs needed
